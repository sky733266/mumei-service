<!DOCTYPE html>
<html lang="zh">
<head>`n  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片压缩 | 沐美服务</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-beautiful.css">
  <style>
    .compress-tool {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .upload-zone {
      border: 3px dashed var(--border);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--bg-glass);
      position: relative;
      overflow: hidden;
    }
    
    .upload-zone:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }
    
    .upload-zone.dragover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
      transform: scale(1.02);
    }
    
    .upload-zone-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      background: var(--primary-gradient);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: var(--shadow-glow);
    }
    
    .upload-zone h3 {
      font-size: 1.5rem;
      margin-bottom: 12px;
    }
    
    .upload-zone p {
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .upload-zone small {
      color: var(--text-dark);
      font-size: 0.875rem;
    }
    
    .file-input {
      display: none;
    }
    
    /* 图片列表 */
    .image-list {
      margin-top: 40px;
    }
    
    .image-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 24px;
      align-items: center;
      transition: all 0.3s ease;
    }
    
    .image-item:hover {
      border-color: var(--border-glow);
    }
    
    .image-preview {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--bg-secondary);
    }
    
    .image-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .image-name {
      font-weight: 600;
      font-size: 1rem;
    }
    
    .image-size {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .image-dimensions {
      color: var(--text-dark);
      font-size: 0.75rem;
    }
    
    .compression-stats {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .compression-rate {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.875rem;
    }
    
    .compression-sizes {
      text-align: right;
    }
    
    .original-size {
      color: var(--text-muted);
      text-decoration: line-through;
      font-size: 0.875rem;
    }
    
    .compressed-size {
      color: var(--success);
      font-weight: 600;
      font-size: 1.125rem;
    }
    
    .image-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .image-actions button {
      padding: 10px 20px;
      font-size: 0.875rem;
    }
    
    /* 压缩设置 */
    .compression-settings {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-top: 24px;
    }
    
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }
    
    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .setting-item label {
      font-weight: 500;
      color: var(--text-secondary);
    }
    
    .quality-slider {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .quality-slider input {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: var(--border);
      outline: none;
      -webkit-appearance: none;
    }
    
    .quality-slider input::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary-gradient);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4);
    }
    
    .quality-value {
      min-width: 50px;
      text-align: center;
      font-weight: 700;
      color: var(--primary);
    }
    
    .format-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .format-option {
      padding: 10px 20px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .format-option:hover {
      border-color: var(--primary-light);
    }
    
    .format-option.active {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
    }
    
    /* 批量操作 */
    .batch-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    
    .batch-info {
      color: var(--text-muted);
    }
    
    .batch-info span {
      color: var(--text);
      font-weight: 600;
    }
    
    /* 进度条 */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--primary-gradient);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    /* 对比视图 */
    .compare-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }
    
    .compare-item {
      text-align: center;
    }
    
    .compare-item h4 {
      margin-bottom: 12px;
      color: var(--text-secondary);
    }
    
    .compare-item img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: var(--shadow-card);
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .image-item {
        grid-template-columns: 1fr;
        text-align: center;
      }
      
      .image-preview {
        margin: 0 auto;
      }
      
      .compression-stats {
        justify-content: center;
      }
      
      .compare-view {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 页面加载动画 -->
  <div id="pageLoader" class="page-loader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <p>加载中...</p>
    </div>
  </div>

  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="/" class="navbar-logo">
        <div class="navbar-logo-icon">🚀</div>
        <span class="navbar-logo-text">沐美服务</span>
      </a>
      
      <div class="navbar-nav">
        <a href="/tools" class="navbar-link">工具箱</a>
        <a href="/panel" class="navbar-link">用户面板</a>
        <a href="/qrcode" class="navbar-link">二维码</a>
        <a href="/compress" class="navbar-link active">图片压缩</a>
      </div>
      
      <div class="navbar-actions">
        <a href="/panel" class="btn btn-primary btn-sm">开始使用</a>
      </div>
    </div>
  </nav>

  <!-- Hero区域 -->
  <header class="hero small">
    <div class="container">
      <h1>图片压缩</h1>
      <p style="color: var(--text-muted);">批量压缩图片，支持 JPG/PNG/WebP，智能优化画质</p>
    </div>
  </header>

  <!-- 工具主体 -->
  <main class="compress-tool">
    <!-- 上传区域 -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
      <div class="upload-zone-icon">📸</div>
      <h3>拖拽图片到这里</h3>
      <p>或点击选择图片</p>
      <small>支持 JPG、PNG、WebP，单个文件最大 10MB</small>
    </div>

    <!-- 压缩设置 -->
    <div class="compression-settings" id="settingsPanel" style="display: none;">
      <h3 style="margin-bottom: 20px;">⚙️ 压缩设置</h3>
      <div class="settings-grid">
        <!-- 质量设置 -->
        <div class="setting-item">
          <label>压缩质量</label>
          <div class="quality-slider">
            <input type="range" id="qualitySlider" min="1" max="100" value="80">
            <span class="quality-value" id="qualityValue">80%</span>
          </div>
        </div>
        
        <!-- 输出格式 -->
        <div class="setting-item">
          <label>输出格式</label>
          <div class="format-options">
            <div class="format-option active" data-format="original">原格式</div>
            <div class="format-option" data-format="jpeg">JPEG</div>
            <div class="format-option" data-format="png">PNG</div>
            <div class="format-option" data-format="webp">WebP</div>
          </div>
        </div>
        
        <!-- 尺寸限制 -->
        <div class="setting-item">
          <label>最大尺寸</label>
          <div class="quality-slider">
            <input type="range" id="maxWidthSlider" min="500" max="4000" value="2000" step="100">
            <span class="quality-value" id="maxWidthValue">2000px</span>
          </div>
        </div>
        
        <!-- 高级选项 -->
        <div class="setting-item">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="keepExif" checked>
            <span>保留 EXIF 信息</span>
          </label>
        </div>
      </div>
    </div>

    <!-- 图片列表 -->
    <div class="image-list" id="imageList"></div>

    <!-- 批量操作 -->
    <div class="batch-actions" id="batchActions" style="display: none;">
      <div class="batch-info">
        已选择 <span id="fileCount">0</span> 个文件
        预计节省 <span id="saveSize">0 MB</span>
      </div>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
        <button class="btn btn-primary" onclick="compressAll()">
          🚀 开始压缩
        </button>
        <button class="btn btn-secondary" onclick="downloadAll()" id="downloadAllBtn" style="display: none;">
          ⬇️ 全部下载
        </button>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <div class="container">
      <p>&copy; 2026 沐美服务 Mumei Service. All rights reserved.</p>
    </div>
  </footer>

  <!-- 加载动画样式 -->
  <style>
    /* 页面加载动画 */
    .page-loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    
    .page-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .loader-content {
      text-align: center;
    }
    
    .loader-spinner {
      width: 80px;
      height: 80px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    
    .loader-content p {
      color: var(--text-muted);
      font-size: 1.125rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 压缩中动画 */
    .compressing .loader-spinner {
      width: 40px;
      height: 40px;
      border-width: 3px;
    }
  </style>

  <script>
    // 页面加载完成后隐藏加载动画
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('pageLoader').classList.add('hidden');
      }, 500);
    });

    // 图片列表
    let images = [];
    let settings = {
      quality: 80,
      format: 'original',
      maxWidth: 2000,
      keepExif: true
    };

    // DOM元素
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const imageList = document.getElementById('imageList');
    const settingsPanel = document.getElementById('settingsPanel');
    const batchActions = document.getElementById('batchActions');

    // 上传区域点击
    uploadZone.addEventListener('click', () => fileInput.click());

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // 拖拽上传
    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    // 处理文件
    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.startsWith('image/')) {
          alert(`${file.name} 不是图片文件`);
          return;
        }
        if (file.size > 10 * 1024 * 1024) {
          alert(`${file.name} 超过 10MB 限制`);
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            images.push({
              id: Date.now() + Math.random(),
              file: file,
              name: file.name,
              originalSize: file.size,
              width: img.width,
              height: img.height,
              preview: e.target.result,
              compressed: null,
              compressing: false
            });
            renderImages();
            updateUI();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // 渲染图片列表
    function renderImages() {
      if (images.length === 0) {
        imageList.innerHTML = '';
        return;
      }

      imageList.innerHTML = images.map(img => `
        <div class="image-item" data-id="${img.id}">
          <img src="${img.preview}" alt="${img.name}" class="image-preview">
          <div class="image-info">
            <div class="image-name">${img.name}</div>
            <div class="image-size">原始大小: ${formatSize(img.originalSize)}</div>
            <div class="image-dimensions">${img.width} × ${img.height} px</div>
            ${img.compressed ? `
              <div class="compression-stats">
                <span class="compression-rate">-${img.compressionRate}%</span>
                <div class="compression-sizes">
                  <div class="original-size">${formatSize(img.originalSize)}</div>
                  <div class="compressed-size">${formatSize(img.compressedSize)}</div>
                </div>
              </div>
            ` : img.compressing ? `
              <div class="progress-bar">
                <div class="progress-fill" style="width: 60%"></div>
              </div>
              <small style="color: var(--text-muted);">压缩中...</small>
            ` : ''}
          </div>
          <div class="image-actions">
            ${img.compressed ? `
              <button class="btn btn-primary" onclick="downloadImage('${img.id}')">⬇️ 下载</button>
              <button class="btn btn-secondary" onclick="removeImage('${img.id}')">删除</button>
            ` : img.compressing ? `
              <button class="btn btn-secondary" disabled>处理中...</button>
            ` : `
              <button class="btn btn-primary" onclick="compressImage('${img.id}')">🚀 压缩</button>
              <button class="btn btn-secondary" onclick="removeImage('${img.id}')">删除</button>
            `}
          </div>
        </div>
      `).join('');
    }

    // 压缩单张图片
    async function compressImage(id) {
      const img = images.find(i => i.id == id);
      if (!img || img.compressing) return;

      img.compressing = true;
      renderImages();

      try {
        const compressed = await compressImageData(img);
        img.compressed = compressed.dataUrl;
        img.compressedSize = compressed.size;
        img.compressionRate = Math.round((1 - compressed.size / img.originalSize) * 100);
        img.compressing = false;
      } catch (error) {
        console.error('压缩失败:', error);
        alert('压缩失败: ' + error.message);
        img.compressing = false;
      }

      renderImages();
      updateBatchInfo();
    }

    // 压缩图片数据
    function compressImageData(img) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // 计算新尺寸
        let newWidth = img.width;
        let newHeight = img.height;
        
        if (newWidth > settings.maxWidth) {
          newHeight = (newHeight * settings.maxWidth) / newWidth;
          newWidth = settings.maxWidth;
        }
        
        canvas.width = newWidth;
        canvas.height = newHeight;
        
        // 绘制图片
        const image = new Image();
        image.onload = () => {
          ctx.drawImage(image, 0, 0, newWidth, newHeight);
          
          // 确定输出格式
          let outputFormat = img.file.type;
          if (settings.format !== 'original') {
            outputFormat = `image/${settings.format}`;
          }
          
          // 转换为DataURL
          const dataUrl = canvas.toDataURL(outputFormat, settings.quality / 100);
          
          // 计算大小
          const base64 = dataUrl.split(',')[1];
          const size = Math.round((base64.length * 3) / 4);
          
          resolve({ dataUrl, size });
        };
        image.onerror = reject;
        image.src = img.preview;
      });
    }

    // 压缩全部
    async function compressAll() {
      const uncompressed = images.filter(img => !img.compressed && !img.compressing);
      
      for (const img of uncompressed) {
        await compressImage(img.id);
      }
      
      document.getElementById('downloadAllBtn').style.display = 'inline-flex';
    }

    // 下载单张
    function downloadImage(id) {
      const img = images.find(i => i.id == id);
      if (!img || !img.compressed) return;

      const link = document.createElement('a');
      link.download = `compressed-${img.name}`;
      link.href = img.compressed;
      link.click();
    }

    // 下载全部
    function downloadAll() {
      images.forEach((img, index) => {
        if (img.compressed) {
          setTimeout(() => downloadImage(img.id), index * 200);
        }
      });
    }

    // 删除图片
    function removeImage(id) {
      images = images.filter(i => i.id != id);
      renderImages();
      updateUI();
    }

    // 清空全部
    function clearAll() {
      images = [];
      renderImages();
      updateUI();
    }

    // 更新UI
    function updateUI() {
      if (images.length > 0) {
        settingsPanel.style.display = 'block';
        batchActions.style.display = 'flex';
        uploadZone.style.display = 'none';
      } else {
        settingsPanel.style.display = 'none';
        batchActions.style.display = 'none';
        uploadZone.style.display = 'block';
        document.getElementById('downloadAllBtn').style.display = 'none';
      }
      updateBatchInfo();
    }

    // 更新批量信息
    function updateBatchInfo() {
      document.getElementById('fileCount').textContent = images.length;
      
      const totalSaved = images
        .filter(img => img.compressed)
        .reduce((sum, img) => sum + (img.originalSize - img.compressedSize), 0);
      
      document.getElementById('saveSize').textContent = formatSize(totalSaved);
    }

    // 格式化大小
    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    // 设置事件监听
    document.getElementById('qualitySlider').addEventListener('input', (e) => {
      settings.quality = parseInt(e.target.value);
      document.getElementById('qualityValue').textContent = settings.quality + '%';
    });

    document.getElementById('maxWidthSlider').addEventListener('input', (e) => {
      settings.maxWidth = parseInt(e.target.value);
      document.getElementById('maxWidthValue').textContent = settings.maxWidth + 'px';
    });

    document.getElementById('keepExif').addEventListener('change', (e) => {
      settings.keepExif = e.target.checked;
    });

    document.querySelectorAll('.format-option').forEach(option => {
      option.addEventListener('click', () => {
        document.querySelectorAll('.format-option').forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        settings.format = option.dataset.format;
      });
    });
  </script>
</body>
</html>
