<!DOCTYPE html>
<html lang="zh">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 | 沐美服务</title>
  <link rel="stylesheet" href="styles-beautiful.css">
  <script src="app-beautiful.js"></script>
  <style>
    .profile-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .profile-header {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      position: relative;
      overflow: hidden;
    }
    .profile-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--primary-gradient);
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      background: var(--primary-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 0 4px rgba(99,102,241,0.2);
    }
    .profile-info { flex: 1; }
    .profile-name { font-size: 1.75rem; font-weight: 700; margin-bottom: 4px; }
    .profile-email { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 12px; }
    .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-plan { background: rgba(99,102,241,0.15); color: var(--primary-light); }
    .badge-member { background: rgba(16,185,129,0.15); color: var(--success); }
    .settings-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
    }
    .settings-card h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .form-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .form-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }
    .btn { padding: 12px 24px; border-radius: 12px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-danger { background: var(--error); color: white; }
    .btn-danger:hover { opacity: 0.9; }
    .toggle-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .toggle-group:last-child { border-bottom: none; }
    .toggle-info h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
    .toggle-info p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
    .toggle-switch {
      width: 48px; height: 26px;
      background: var(--border);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch::after {
      content: '';
      width: 20px; height: 20px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle-switch.active { background: var(--primary); }
    .toggle-switch.active::after { transform: translateX(22px); }
    .danger-zone { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.03); }
    .danger-zone h3 { color: var(--error); }
    .danger-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(239,68,68,0.15); }
    .danger-item:last-child { border-bottom: none; padding-bottom: 0; }
    .danger-info h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
    .danger-info p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
    @media (max-width: 640px) {
      .profile-header { flex-direction: column; text-align: center; padding: 24px; }
      .profile-badges { justify-content: center; }
      .settings-card { padding: 20px; }
      .danger-item { flex-direction: column; gap: 12px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header style="position:sticky;top:0;z-index:100;background:rgba(13,13,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px;max-width:1100px;margin:0 auto;height:64px;">
      <a href="/" style="font-size:1.25rem;font-weight:700;color:var(--text);text-decoration:none;">沐美服务</a>
      <div style="display:flex;gap:8px;">
        <a href="/tools" style="padding:8px 16px;color:var(--text-muted);text-decoration:none;font-size:14px;">工具箱</a>
        <a href="/pricing" style="padding:8px 16px;color:var(--text-muted);text-decoration:none;font-size:14px;">定价</a>
        <a href="/panel" style="padding:8px 16px;color:var(--text-muted);text-decoration:none;font-size:14px;">控制台</a>
        <a href="/profile" style="padding:8px 16px;color:var(--primary);text-decoration:none;font-size:14px;font-weight:600;">个人中心</a>
      </div>
    </div>
  </header>

  <main class="profile-container">
    <!-- 用户信息卡片 -->
    <div class="profile-header">
      <div class="profile-avatar" id="userAvatar">?</div>
      <div class="profile-info">
        <div class="profile-name" id="userName">加载中...</div>
        <div class="profile-email" id="userEmail"></div>
        <div class="profile-badges">
          <span class="profile-badge badge-plan" id="userPlan">免费版</span>
          <span class="profile-badge badge-member" id="memberDays">0天</span>
        </div>
      </div>
    </div>

    <!-- 基本信息 -->
    <div class="settings-card">
      <h3><span>👤</span> 基本信息</h3>
      <div class="form-group">
        <label>显示名称</label>
        <input type="text" id="displayName" placeholder="设置您的显示名称" maxlength="50">
      </div>
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="emailInput" disabled>
        <p class="form-hint">邮箱地址不可修改</p>
      </div>
      <div class="form-group">
        <label>个人简介</label>
        <input type="text" id="bioInput" placeholder="简单介绍一下自己" maxlength="200">
      </div>
      <button class="btn btn-primary" onclick="saveProfile()" style="width:100%;margin-top:4px;">
        保存修改
      </button>
    </div>

    <!-- 安全设置 -->
    <div class="settings-card">
      <h3><span>🔒</span> 安全设置</h3>
      <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="currentPassword" placeholder="输入当前密码">
      </div>
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPassword" placeholder="设置新密码（至少6位）">
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="再次输入新密码">
      </div>
      <button class="btn btn-primary" onclick="changePassword()" style="width:100%;">
        修改密码
      </button>
    </div>

    <!-- 通知设置 -->
    <div class="settings-card">
      <h3><span>🔔</span> 通知设置</h3>
      <div class="toggle-group">
        <div class="toggle-info">
          <h4>邮件通知</h4>
          <p>接收账户相关邮件通知</p>
        </div>
        <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
      </div>
      <div class="toggle-group">
        <div class="toggle-info">
          <h4>使用报告</h4>
          <p>每周接收API使用统计报告</p>
        </div>
        <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
      </div>
      <div class="toggle-group">
        <div class="toggle-info">
          <h4>安全提醒</h4>
          <p>登录异常时接收安全提醒</p>
        </div>
        <div class="toggle-switch active" onclick="toggleSwitch(this)"></div>
      </div>
      <div class="toggle-group">
        <div class="toggle-info">
          <h4>产品更新</h4>
          <p>接收新功能和更新通知</p>
        </div>
        <div class="toggle-switch" onclick="toggleSwitch(this)"></div>
      </div>
    </div>

    <!-- 账户管理 -->
    <div class="settings-card danger-zone">
      <h3><span>⚠️</span> 账户管理</h3>
      <div class="danger-item">
        <div class="danger-info">
          <h4>导出账户数据</h4>
          <p>下载您的所有账户数据副本</p>
        </div>
        <button class="btn btn-danger" onclick="exportData()" style="font-size:0.8rem;padding:8px 16px;">导出数据</button>
      </div>
      <div class="danger-item" style="margin-top:16px;">
        <div class="danger-info">
          <h4 style="color:var(--error);">删除账户</h4>
          <p>永久删除您的账户和所有数据，此操作不可恢复</p>
        </div>
        <button class="btn btn-danger" onclick="deleteAccount()" style="font-size:0.8rem;padding:8px 16px;">删除账户</button>
      </div>
    </div>
  </main>

  <footer style="text-align:center;padding:32px 20px;color:var(--text-muted);font-size:0.8rem;">
    &copy; 2026 沐美服务 Mumei Service
  </footer>

  <script src="profile.js"></script>
</body>
</html>
