<!-- 工具网格（由 JS 动态渲染） -->

      </div>

  <script src="tools.js"></script>

    {id:'data/json-path',     name:'JSONPath查询',   cat:'data',   aliases:['jsonpath','json查询'],                               desc:'JSONPath表达式查询',     pro:false},
    {id:'data/yaml-convert',  name:'YAML转换',        cat:'data',   aliases:['yaml','yaml转换json'],                              desc:'YAML 与 JSON 互转',     pro:false},

    {id:'network/speed-test', name:'网络测速',         cat:'network',aliases:['测速','speedtest','网速'],                         desc:'网络延迟与带宽测速',    pro:false},
    {id:'network/http-request',name:'HTTP请求',       cat:'network',aliases:['http','curl','api测试'],                            desc:'发送 HTTP 请求调试 API',pro:false},

    {id:'security/hash-calc', name:'哈希计算器',       cat:'security',aliases:['hashcalc','批量哈希'],                              desc:'批量文件哈希计算',       pro:false},
    {id:'security/mask-data', name:'数据脱敏',          cat:'security',aliases:['脱敏','mask','隐私保护'],                          desc:'身份证/手机/邮箱脱敏',  pro:false},
    {id:'dev/code-format',    name:'代码格式化',       cat:'dev',   aliases:['格式化','prettier','format'],                        desc:'代码美化格式化',         pro:false},
    {id:'dev/code-minify',    name:'代码压缩',          cat:'dev',   aliases:['压缩','minify','uglify'],                            desc:'JS/CSS/HTML 代码压缩',  pro:false},
    {id:'dev/code-diff',      name:'代码对比',           cat:'dev',   aliases:['diff','对比','代码差异'],                            desc:'两段代码差异对比',      pro:false},
    {id:'dev/cron-parse',     name:'Cron解析',           cat:'dev',   aliases:['cron','定时任务'],                                   desc:'Cron 表达式解析与可视化',pro:false},
    {id:'dev/timestamp',      name:'时间戳',             cat:'dev',   aliases:['timestamp','unix time'],                            desc:'时间戳转换',            pro:false},
    {id:'dev/color-convert',  name:'颜色转换',           cat:'dev',   aliases:['颜色','color','hex','rgb'],                          desc:'HEX/RGB/HSL 颜色互转',  pro:false},
    {id:'dev/markdown-preview',name:'Markdown预览',    cat:'dev',   aliases:['md','markdown','编辑器'],                              desc:'Markdown 实时预览',      pro:false},
    {id:'dev/qr-decode',      name:'二维码解码',         cat:'dev',   aliases:['qr','二维码解码','扫码'],                             desc:'上传图片解析二维码内容',pro:false},
    {id:'dev/cron-generate',  name:'Cron生成',           cat:'dev',   aliases:['cron生成','定时'],                                   desc:'可视化生成 Cron 表达式',pro:false},
  ];

  const FAV_KEY = 'mumei_fav_v2';
  let favorites = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
  const DEFAULT_QUICK = ['data/json-format','security/password-generate','data/regex-test','security/hash','dev/timestamp','network/dns'];

  function getQuickTools() {
    const saved = JSON.parse(localStorage.getItem('mumei_quick') || 'null');
    return (saved && saved.length >= 3) ? saved : DEFAULT_QUICK;
  }

  function renderQuickTools() {
    const grid = document.getElementById('quickToolsGrid');
    if (!grid) return;
    grid.innerHTML = getQuickTools().map(id => {
      const t = ALL_TOOLS.find(x => x.id === id);
      if (!t) return '';
      return '<button class="quick-btn" onclick="openToolModal(\''+t.id+'\')">'+getToolEmoji(t.id)+' '+t.name+'</button>';
    }).join('');
  }

  function renderAlphaIndex() {
    const wrap = document.getElementById('alphaIndex');
    if (!wrap) return;
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ#'.split('');
    const used = new Set(ALL_TOOLS.map(t => /[A-Z]/.test(t.name[0]) ? t.name[0].toUpperCase() : '#'));
    wrap.innerHTML = letters.map(l => used.has(l)
      ? '<button class="alpha-btn" onclick="filterByAlpha(\''+l+'\')">'+l+'</button>'
      : '<span class="alpha-btn alpha-empty">'+l+'</span>'
    ).join('');
  }

  function renderTools(category, searchQ, alphaLetter) {
    const grid = document.getElementById('toolsGrid');
    if (!grid) return;
    const q = (searchQ||'').toLowerCase().trim();
    const alpha = alphaLetter||'';
    let filtered = ALL_TOOLS.filter(t => {
      if (category && category !== 'all' && t.cat !== category) return false;
      if (q && !t.name.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q) && !t.aliases.some(a => a.toLowerCase().includes(q))) return false;
      if (alpha && (alpha==='#' ? /[A-Z]/.test(t.name[0]) : t.name[0].toUpperCase() !== alpha)) return false;
      return true;
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)"><p>没有找到相关工具</p><p>换个关键词试试</p></div>';
      return;
    }

    const catMap = {ai:'AI',data:'数据',network:'网络',security:'安全',dev:'开发'};
    grid.innerHTML = filtered.map(t => {
      const favd = favorites.includes(t.id);
      const label = catMap[t.cat] || t.cat;
      return '<div class="tool-card" data-category="'+t.cat+'" data-tool="'+t.id+'" onclick="openToolModal(\''+t.id+'\')">'+
        '<div class="tool-icon">'+getToolEmoji(t.id)+'</div>'+
        '<h3>'+highlightMatch(t.name, q)+'</h3>'+
        '<p>'+highlightMatch(t.desc, q)+'</p>'+
        '<div class="tool-meta">'+
          '<span class="tool-cat">'+label+'</span>'+
          '<span class="tool-tag '+(t.pro?'pro':'free')+'">'+(t.pro?'PRO':'FREE')+'</span>'+
          '<button class="fav-btn" onclick="event.stopPropagation();toggleFav(\''+t.id+'\',this)" style="background:none;border:none;cursor:pointer;padding:0 4px;font-size:1rem">'+(favd?'★':'☆')+'</button>'+
        '</div></div>';
    }).join('');
  }

  function highlightMatch(text, q) {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q);
    if (idx < 0) return text;
    return text.slice(0,idx)+'<mark>'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
  }

  function toggleFav(id, btn) {
    const idx = favorites.indexOf(id);
    if (idx > -1) { favorites.splice(idx,1); btn.textContent = '☆'; }
    else { favorites.push(id); btn.textContent = '★'; }
    localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
    renderQuickTools();
  }

  function filterByAlpha(letter) {
    window.currentAlpha = letter;
    document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
    var allTab = document.querySelector('.tool-tab[data-category="all"]');
    if (allTab) allTab.classList.add('active');
    var q = document.getElementById('mainSearch') ? document.getElementById('mainSearch').value.trim() : '';
    renderTools('all', q, letter);
    var si = document.getElementById('searchInput');
    if (si) si.value = letter ? '' : q;
    var sug = document.getElementById('searchSuggestions');
    if (sug) sug.style.display = 'none';
  }

  function getToolEmoji(id) {
    var m = {
      'ai/text-generate':'🤖','ai/image-generate':'🎨','ai/tts':'🔊','ai/stt':'🎤','ai/translate':'🌐',
      'ai/code-generate':'💻','ai/code-review':'🔍','ai/summarize':'📝',
      'data/json-format':'📋','data/csv-convert':'📊','data/sql-format':'🗄️','data/regex-test':'🔎',
      'data/base64':'🔢','data/jwt':'🔐','data/text-stats':'📝','data/case-convert':'🔤',
      'data/lorem-ipsum':'📄','data/number-to-chinese':'💰','data/date-calculator':'📅',
      'data/random-number':'🎲','data/calculator':'🔢','data/json-path':'🔎','data/yaml-convert':'📋',
      'network/dns':'🌐','network/ip-lookup':'📍','network/whois':'📇','network/ssl-check':'🔒',
      'network/speed-test':'⚡','network/http-request':'📡','network/url-parser':'🔗',
      'security/password-generate':'🔑','security/password-check':'🔍','security/hash':'#️⃣',
      'security/url-encode':'🔗','security/html-escape':'🛡️','security/uuid':'🆔',
      'security/barcode':'📊','security/meta-generator':'🔍','security/hash-calc':'🔏','security/mask-data':'🚫',
      'dev/code-format':'✨','dev/code-minify':'📦','dev/code-diff':'📑',
      'dev/cron-parse':'⏰','dev/timestamp':'🕐','dev/color-convert':'🎨',
      'dev/markdown-preview':'📝','dev/qr-decode':'📱','dev/cron-generate':'⏱️',
    };
    return m[id] || '🛠️';
  }

  // DOMContentLoaded：只绑定事件，渲染统一在这里调用
  document.addEventListener('DOMContentLoaded', function() {
    renderQuickTools();
    renderAlphaIndex();
    renderTools('all', '', '');

    // 搜索
    var searchInput = document.getElementById('mainSearch');
    if (searchInput) {
      var timer;
      searchInput.addEventListener('input', function() {
        var q = this.value.trim();
        var clearBtn = document.getElementById('searchClear');
        if (clearBtn) clearBtn.style.display = q ? 'inline' : 'none';
        clearTimeout(timer);
        timer = setTimeout(function() {
          renderTools('all', q, window.currentAlpha || '');
        }, 200);
      });
      searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          var s = document.getElementById('searchSuggestions');
          if (s) s.style.display = 'none';
        }
        if (e.key === 'Enter') {
          var s = document.getElementById('searchSuggestions');
          if (s) s.style.display = 'none';
          renderTools('all', this.value.trim(), window.currentAlpha || '');
        }
      });
    }

    // 分类标签
    document.querySelectorAll('.tool-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tool-tab').forEach(function(t) { t.classList.remove('active'); });
        this.classList.add('active');
        window.currentAlpha = '';
        var q = document.getElementById('mainSearch') ? document.getElementById('mainSearch').value.trim() : '';
        renderTools(this.dataset.category, q, '');
      });
    });

    // 关闭弹窗（来自 tools.js）
    var closeBtn = document.getElementById('closeToolModal');
    if (closeBtn) closeBtn.addEventListener('click', closeToolModal);
    var modal = document.getElementById('toolModal');
    if (modal) modal.addEventListener('click', function(e) { if (e.target === modal) closeToolModal(); });

    // 免费试用
    var authToken = localStorage.getItem('authToken');
    if (!authToken) {
      var badge = document.getElementById('trialBadge');
      if (badge) {
        badge.style.display = 'inline';
        var n = parseInt(localStorage.getItem('freeTrialCount') || '10', 10);
        var tc = document.getElementById('trialCount');
        if (tc) tc.textContent = n > 0 ? n : 0;
      }
    }

    // 语言切换（调用 tools.js 的 switchLang）
    var sel = document.getElementById('languageSelect');
    if (sel) {
      sel.value = localStorage.getItem('language') || 'zh';
      sel.addEventListener('change', function() {
        localStorage.setItem('language', this.value);
        if (typeof switchLang === 'function') switchLang(this.value);
      });
    }
  });
  </script>
