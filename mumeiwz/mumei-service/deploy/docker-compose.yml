  #     - MONGO_INITDB_ROOT_USERNAME=mumei
  #     - MONGO_INITDB_ROOT_PASSWORD=your-secure-password
  #     - MONGO_INITDB_DATABASE=mumei_service
  #   volumes:
  #     - mongodb_data:/data/db
  #   ports:
  #     - "27017:27017"

volumes:
  mongodb_data:
